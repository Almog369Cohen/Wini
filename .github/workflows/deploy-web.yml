name: Deploy Web Pilot to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: screen-translator/package-lock.json

      - name: Install dependencies
        working-directory: screen-translator
        run: npm ci

      - name: Build web version
        working-directory: screen-translator
        run: npx vite build --base /Wini/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: screen-translator/dist/renderer

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
